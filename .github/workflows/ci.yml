name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependency
        run: python -m pip install "ruff>=0.12,<1"
      - name: Check formatting and lint
        run: |
          python -m ruff format --no-cache --check scripts tests
          python -m ruff check --no-cache scripts tests
      - name: Validate release structure
        run: python scripts/check_release.py --tag v4.0.0 --release-notes CHANGELOG.md
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile scripts
        run: python -m compileall -q scripts
