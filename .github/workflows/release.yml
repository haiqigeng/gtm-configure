name: Release

on:
  push:
    tags:
      - "v20*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate release tag and package
        run: |
          python scripts/check_release.py --tag "$GITHUB_REF_NAME" --release-notes CHANGELOG.md
          python -m unittest discover -s tests -v
      - name: Build runtime package
        run: python scripts/build_skill_package.py --output "dist/configure-gtm-$GITHUB_REF_NAME.zip"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: dist/configure-gtm-*.zip
