name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependency
        run: python -m pip install "ruff>=0.12,<1"
      - name: Validate release tag and package
        run: |
          python -m ruff format --no-cache --check scripts tests
          python -m ruff check --no-cache scripts tests
          python scripts/check_release.py --tag "$GITHUB_REF_NAME" --release-notes CHANGELOG.md --require-git-tag --require-clean-tree
          python -m unittest discover -s tests -v
      - name: Build runtime package
        run: python scripts/build_skill_package.py --output "dist/configure-gtm-$GITHUB_REF_NAME.zip"
      - name: Prepare current release notes
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"].removeprefix("v")
          heading = f"## {version}"
          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          try:
              start = lines.index(heading)
          except ValueError as exc:
              raise SystemExit(f"CHANGELOG.md is missing {heading}") from exc
          end = next(
              (index for index in range(start + 1, len(lines)) if lines[index].startswith("## ")),
              len(lines),
          )
          Path("dist/release-notes.md").write_text(
              "\n".join(lines[start:end]).rstrip() + "\n",
              encoding="utf-8",
          )
          PY
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: dist/release-notes.md
          files: dist/configure-gtm-*.zip
